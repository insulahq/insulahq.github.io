name: Build & publish Insula docs

# Publishes the org-root site (https://insulahq.github.io/) from the manual
# living in the PUBLIC insulahq/insula repo (documentation/). No cross-repo
# credential needed: the source is public (anonymous checkout) and we deploy
# to THIS repo's own Pages via the built-in GITHUB_TOKEN.
#
# Triggers: manual (workflow_dispatch) + every 15 min (schedule). A SHA guard
# skips the build/deploy when insula@main hasn't changed since the last run,
# so idle runs are cheap and Pages isn't redeployed needlessly.
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write   # commit the last-deployed SHA marker
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SOURCE_REPO: insulahq/insula

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout this repo (for the SHA marker)
        uses: actions/checkout@v4

      - name: Resolve source HEAD + compare to last deployed
        id: gate
        run: |
          SRC_SHA=$(curl -fsSL -H "Accept: application/vnd.github.sha" \
            "https://api.github.com/repos/${SOURCE_REPO}/commits/main")
          echo "src_sha=$SRC_SHA" >> "$GITHUB_OUTPUT"
          LAST=$(cat .last-deployed-sha 2>/dev/null || echo "none")
          echo "Source main: $SRC_SHA ; last deployed: $LAST"
          if [ "$SRC_SHA" = "$LAST" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source manual (public, pinned to resolved SHA)
        if: steps.gate.outputs.changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ steps.gate.outputs.src_sha }}
          path: source

      - name: Set up Python
        if: steps.gate.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: source/documentation/requirements.txt

      - name: Build manual
        if: steps.gate.outputs.changed == 'true'
        working-directory: source
        run: |
          pip install -r documentation/requirements.txt
          python3 documentation/gen/changelog.py
          mkdocs build --strict -f documentation/mkdocs.yml

      - name: Upload Pages artifact
        if: steps.gate.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: source/documentation/site

      - name: Deploy to GitHub Pages
        id: deploy
        if: steps.gate.outputs.changed == 'true'
        uses: actions/deploy-pages@v4

      - name: Record deployed SHA
        if: steps.gate.outputs.changed == 'true'
        run: |
          echo "${{ steps.gate.outputs.src_sha }}" > .last-deployed-sha
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-deployed-sha
          git commit -m "ci: deployed insula@${{ steps.gate.outputs.src_sha }}" || echo "no change"
          git push
